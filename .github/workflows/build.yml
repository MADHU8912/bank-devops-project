name: Bank App CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Start Backend (Test)
        run: |
          cd backend
          node server.js &
          sleep 5

      - name: Build Success Message
        run: echo "Build completed successfully"