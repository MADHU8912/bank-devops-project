name: Docker Build Push Pull and Render Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Image
        run: docker build -t nikhilabba12/bank-backend:latest ./backend

      - name: Push Backend Image
        run: docker push nikhilabba12/bank-backend:latest

      - name: Remove Local Backend Image
        run: docker rmi nikhilabba12/bank-backend:latest || true

      - name: Docker Pull Test
        run: docker pull nikhilabba12/bank-backend:latest

      - name: Trigger Render Deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"