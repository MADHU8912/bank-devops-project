name: Full CI CD with Docker Pull and Render Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Image
        run: docker build -t nikhilabba12/bank-backend:latest ./backend

      - name: Build Frontend Image
        run: docker build -t nikhilabba12/bank-frontend:latest ./frontend

      - name: Push Backend Image
        run: docker push nikhilabba12/bank-backend:latest

      - name: Push Frontend Image
        run: docker push nikhilabba12/bank-frontend:latest

      - name: Remove Local Images
        run: |
          docker rmi nikhilabba12/bank-backend:latest || true
          docker rmi nikhilabba12/bank-frontend:latest || true

      - name: Docker Pull Test
        run: |
          docker pull nikhilabba12/bank-backend:latest
          docker pull nikhilabba12/bank-frontend:latest

      - name: Trigger Render Backend Deploy
        run: curl -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

      - name: Trigger Render Frontend Deploy
        run: curl -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"